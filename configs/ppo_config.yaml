algorithm: PPO
policy: MultiInputPolicy

# Track A ("raw", default) vs Track B (SAGE, "symbolic"). Global toggle, not
# per-curriculum-stage -- train.py forwards this into every stage's EnvConfig.
# symbolic mode uses a separate checkpoint namespace (ckpts/symbolic_stage{N}/,
# ppo_drone_symbolic_stage{N}_*) -- never resumes from / clobbers a raw run.
policy_mode: "symbolic"  # "raw" | "symbolic"

# CBFShield real QP vs identity passthrough — symbolic mode only (train.py
# forwards this the same way as policy_mode, via stage_conf -> EnvConfig's
# generic field filter in make_env()). No effect at all when policy_mode="raw".
cbf_enabled: true
# Minimal-intervention QP (grad_h.u >= -cbf_alpha*h, h=EDT(x)-margin) -- only
# forces an active escape once h<0 (drone already inside cbf_safety_margin),
# scaled by cbf_alpha. Defaults (0.5m/2.0) were hardcoded and felt weak in
# practice (intervenes but not hard enough to actually clear an obstacle) --
# raised both: bigger margin triggers farther out, bigger alpha makes the
# push steeper once triggered.
cbf_safety_margin: 0.5   # metres
cbf_alpha: 3.5

seed: 42

# Core PPO
n_steps: 1024
batch_size: 128
n_epochs: 3
learning_rate: 3.0e-2         # peak LR -- lr_schedule below decides how it's used
# Per-stage cosine anneal: progress_remaining resets to 1.0 (peak) at the
# start of EACH stage's .learn() call, 0.0 (lr_final_frac*peak) at its end --
# resume-safe (interrupted/checkpoint resume continues mid-cosine, no jump,
# see train.py's _make_lr_schedule docstring). "constant" = old flat-LR
# behavior, unchanged.
lr_schedule: "cosine"          # "constant" | "cosine"
lr_final_frac: 1.0e-5          # cosine floor = learning_rate * this (3e-2 -> 3e-7)

# ── CNN cold-start per-group LR ────────────────────────────────────────────────
# Chỉ kích hoạt 1 lần khi chuyển stage freeze_cnn→pillar (stage 1→2).
# Công thức: LR_nhánh = scale × learning_rate (1e-4)
#
# ── cnn_coldstart_cnn_lr_scale  (CNN + cnn_fc) ──────────────────────────────
#   CNN bị frozen suốt stage 0-1 → weights lạnh, cần học nhanh để "thức dậy".
#   Default 1.0 → LR = 1e-4 (full).
#
#   Dấu hiệu scale QUÁ CAO (> 1.0):
#     • 10–30k bước đầu stage 2: reward sụp mạnh rồi mới phục hồi
#     • drone quay vòng hoặc mất hướng goal hoàn toàn trong ~10k bước đầu
#     → Giảm xuống 0.5 (thử trước), rồi 0.3 nếu vẫn còn
#
#   Dấu hiệu scale QUÁ THẤP (< 0.3):
#     • Sau 150k+ bước stage 2 drone vẫn bay thẳng vào cột (BEV không có tác dụng)
#     • episode length không giảm dù đã lâu
#     → Tăng lên 1.0 (default)
#
cnn_coldstart_cnn_lr_scale: 0.30     # CNN+cnn_fc:  0.30 × 1e-4 = 3.0e-5 | range gợi ý: 0.3–1.0

# ── cnn_coldstart_state_lr_scale  (state_fc) ────────────────────────────────
#   state_fc đã encode nav policy (vel/goal/yaw) qua 500k bước stage 1.
#   Giữ LR thấp để tránh gradient từ CNN rác làm hỏng motion policy vừa học.
#   Default 0.1 → LR = 1e-5 (chậm hơn CNN 10×).
#
#   Dấu hiệu scale QUÁ CAO (> 0.2):
#     • 20–50k bước đầu stage 2: drone không còn bay về hướng goal
#       (yaw_align reward giảm mạnh so với cuối stage 1)
#     • drone hover tại chỗ hoặc quay ngẫu nhiên
#     → Giảm xuống 0.05
#
#   Dấu hiệu scale QUÁ THẤP (< 0.05):
#     • state_fc không thể adapt với context mới (drone bay vào fence nhiều hơn stage 1)
#     • improvement rất chậm dù CNN đã học tốt BEV (reward CNN-related tăng nhưng total không tăng)
#     → Tăng lên 0.1 (default)
#
cnn_coldstart_state_lr_scale: 0.1   # state_fc:    0.1 × 1e-4 = 1e-5  | range gợi ý: 0.05–0.2

# ── cnn_coldstart_fusion_lr_scale  (fusion_fc + fusion_norm + mlp + actor + critic) ──
#   Fusion gate kết nối CNN output (256) + state output (64) → features.
#   Heads (actor/critic) ngồi trên fusion → LR quá cao → critic value estimate
#   không ổn định → PPO clip không đủ → policy gradient nhiễu.
#   Default 0.33 → LR ≈ 3.3e-5 (giữa CNN và state_fc).
#
#   Dấu hiệu scale QUÁ CAO (> 0.5):
#     • value_loss tăng vọt trong 10–20k bước đầu stage 2 (critic overfit noise)
#     • entropy collapse sớm (< 20k bước): policy bị deterministic quá sớm
#     → Giảm xuống 0.1
#
#   Dấu hiệu scale QUÁ THẤP (< 0.1):
#     • Policy improvement chậm dù CNN+state_fc đã học tốt
#     • actor/critic heads không theo kịp feature extractor → reward plateau
#     → Tăng lên 0.33 (default)
#
cnn_coldstart_fusion_lr_scale: 0.33 # fusion+heads: 0.33 × 1e-4 ≈ 3.3e-5 | range gợi ý: 0.1–0.5
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
target_kl: 0.05  # early-stop an epoch once approx_kl exceeds this (SB3 default: None = no protection).
                 # Added after stage2 (training_progress_stage2.csv) showed reward crashes correlating
                 # with approx_kl spikes to 0.08-0.10 with nothing stopping the update. 0.05 chosen from
                 # this run's own data: several healthy checkpoints already sit at kl~0.07-0.076 with
                 # good reward (rows 60/66), so a textbook-default 0.01-0.02 would trigger on normal
                 # noise here -- 0.05 lets that pass while still catching the 0.08+ outliers that
                 # coincided with the worst crashes (row 69: kl=0.103, worst reward in that window).
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5

# Training
total_timesteps: 10_000_000
n_envs: 1
log_dir: "runs/"
checkpoint_freq: 5_000

# Curriculum stages
# Optional env_overrides keys map directly to EnvConfig fields — any field can be overridden.
# Noise defaults (0.0 = disabled). Suggested real-hardware values for reference:
#   obs_noise_vel_std:     0.05   (m/s)
#   obs_noise_ang_vel_std: 0.01   (rad/s)
#   obs_noise_pos_std:     0.10   (m)
#   obs_noise_yaw_std:     0.03   (rad)
curriculum:
  - stage: 0
    num_pillars: 0
    min_pillars: 0
    max_pillars: 0
    uniform_pillar: false
    min_steps: 90_000            # old 295_000 
    freeze_vz: false             # horizontal nav only — vz locked to 0
    freeze_cnn: true             # no pillars — CNN branch frozen, train state MLP only
    use_symbolic_extractor: true # 3-channel kinematic BEV (default False = 1-channel depth)
    # Pre-episode yaw assist, ramping down over training (see _YAW_SCHEDULE in
    # train_manager.py's reset()) — helps FacePrimitive's p_face gate learn
    # from easier (closer-to-aligned) starts early on, fading to full-random
    # start yaw by 300k combined steps. Stage1 carries this ramp forward via
    # yaw_curriculum_carryover_steps instead of resetting it.
    # frac is relative to THIS stage's min_steps (90_000) -- 3.3333 means the
    # ramp intentionally outlives stage0 (300k > 90k), finishing early into
    # stage1 via yaw_curriculum_carryover_steps there. If min_steps above
    # changes, this frac auto-rescales to keep the same 300k-equivalent ramp
    # only if you also update it -- it is NOT auto-derived from the old
    # absolute number, recompute as desired_step_count / min_steps.
    pre_episode_auto_yaw_enabled: true
    yaw_curriculum_frac: 3.3333
    # Stage 0: zero noise — drone học hành vi cơ bản, nhiễu sẽ cản trở hội tụ
    obs_noise_pos_std: 0.0
    obs_noise_vel_std: 0.0
    obs_noise_yaw_std: 0.0
    obs_noise_ang_vel_std: 0.0
    obs_noise_quat_std: 0.0
    action_noise_std: 0.0
    action_delay_steps: 0
    mass_scale_min: 1.0          # no mass randomisation — clean dynamics
    mass_scale_max: 1.0
    wind_speed_max: 0.0          # no wind
    # Goal radius curriculum (stage-relative steps): start large, ramp down
    goal_xy_radius_schedule_values: [3.0, 1.5, 1.0, 0.5]
    goal_xy_radius_schedule_steps:  [0, 50_000, 130_000, 220_000]

  - stage: 1
    num_pillars: 0
    min_pillars: 0
    max_pillars: 0
    uniform_pillar: false
    min_steps: 110_000           # old 530_000
    freeze_vz: false             # vz unlocked — full altitude control
    freeze_cnn: true             # no pillars — CNN branch frozen, train state MLP only
    use_symbolic_extractor: true # 3-channel kinematic BEV (default False = 1-channel depth)
    # Continues stage0's yaw-assist ramp instead of resetting to 100% assist
    # at this stage boundary -- carryover = stage0's min_steps (295_000).
    # _YAW_SCHEDULE hits its 300k/0.0-assist floor almost immediately once
    # this stage starts (295_000 + a few thousand more steps).
    pre_episode_auto_yaw_enabled: true
    yaw_curriculum_frac: 1.3636  # 150_000 / this stage's min_steps (110_000)
    yaw_curriculum_carryover_from_prev_stage: true  # = stage0's min_steps, looked up by train.py at runtime
    # Stage 1: nhiễu obs rất nhỏ, chưa có action noise/delay — vz mới mở, cần ổn định trước
    obs_noise_pos_std: 0.08
    obs_noise_vel_std: 0.04
    obs_noise_yaw_std: 0.015
    obs_noise_ang_vel_std: 0.007
    obs_noise_quat_std: 0.008
    action_noise_std: 0.01
    action_delay_steps: 1
    mass_scale_min: 0.95        # no mass randomisation — altitude control cần ổn định trước
    mass_scale_max: 1.05
    wind_speed_max: 0.5          # no wind

  - stage: 2
    num_pillars: 7
    min_pillars: 7
    max_pillars: 9
    uniform_pillar: true
    min_decor_pillars: 0
    max_decor_pillars: 0
    min_steps: 550_000
    pre_episode_auto_yaw_enabled: true
    yaw_curriculum_frac: 0.1875  # 0→π over first 18.75% of min_steps (150k of 800k); full random after
    use_symbolic_extractor: true # 3-channel kinematic BEV (default False = 1-channel depth)
    # Stage 2: per-episode delay [0,1] + bắt đầu mass/wind nhẹ

    obs_noise_pos_std: 0.08
    obs_noise_vel_std: 0.04
    obs_noise_yaw_std: 0.015
    obs_noise_ang_vel_std: 0.007
    obs_noise_quat_std: 0.008
    action_noise_std: 0.03
    action_delay_steps: 0        # per-episode uniform int in [0, action_delay_steps_max]
    action_delay_steps_max: 1
    mass_scale_min: 0.95         # ±5% mass variation
    mass_scale_max: 1.05
    wind_speed_max: 0.25          # up to 0.5 m/s wind
    # Moving pillars — off by default. Flip dynamic_pillar_enabled: true and
    # set num_dynamic_pillars > 0 to make that many of this stage's spawned
    # pillars random-walk (random heading, re-picked every
    # dynamic_pillar_dir_change_interval_s) within dynamic_pillar_move_radius
    # of their own spawn point.
    dynamic_pillar_enabled: true
    num_dynamic_pillars: 3
    dynamic_pillar_speed_min: 0.4   # m/s
    dynamic_pillar_speed_max: 1.0   # m/s
    dynamic_pillar_move_radius: 3.0 # m
    dynamic_pillar_dir_change_interval_s: 2.0


  - stage: 3
    num_pillars: 8
    min_pillars: 5
    max_pillars: 7
    uniform_pillar: true
    min_decor_pillars: 3
    max_decor_pillars: 5
    # Few pillars this stage -> force every one into the active corridor
    # (real dodge-required obstacle) instead of rolling p_blocking's default
    # 0.7 chance per segment, which at low N risks episodes with too few
    # genuine obstacles for dfa_N/skip_penalty to mean much.
    
    min_steps: 500_000
    use_symbolic_extractor: true # 3-channel kinematic BEV (default False = 1-channel depth)
    # Stage 3: per-episode delay [0,2] — drone phải robust với nhiều mức latency
    obs_noise_pos_std: 0.10
    obs_noise_vel_std: 0.05
    obs_noise_yaw_std: 0.02
    obs_noise_ang_vel_std: 0.010
    obs_noise_quat_std: 0.010
    action_noise_std: 0.04
    action_delay_steps: 0        # per-episode uniform int in [0, 2]
    action_delay_steps_max: 2
    mass_scale_min: 0.92         # ±8% mass variation
    mass_scale_max: 1.08
    wind_speed_max: 0.3          # up to 1.0 m/s wind
    dynamic_pillar_enabled: true
    num_dynamic_pillars: 3
    dynamic_pillar_speed_min: 0.4
    dynamic_pillar_speed_max: 0.8
    dynamic_pillar_move_radius: 3.0
    dynamic_pillar_dir_change_interval_s: 2.0

  - stage: 4
    num_pillars: 6
    min_pillars: 6
    max_pillars: 12
    uniform_pillar: true
    min_decor_pillars: 4
    max_decor_pillars: 8
    min_steps: 500_000
    use_symbolic_extractor: true # 3-channel kinematic BEV (default False = 1-channel depth)
    # Stage 4: gần thực tế — ESC jitter + VIO drift + delay + mass + wind đồng thời
    obs_noise_pos_std: 0.15
    obs_noise_vel_std: 0.07
    obs_noise_yaw_std: 0.025
    obs_noise_ang_vel_std: 0.012
    obs_noise_quat_std: 0.012
    action_noise_std: 0.05
    action_delay_steps: 0        # per-episode uniform int in [0, 2]
    action_delay_steps_max: 2
    mass_scale_min: 0.90         # ±10% mass variation (Kaufmann 2023: ±15%)
    mass_scale_max: 1.10
    wind_speed_max: 0.4          # up to 0.4 m/s wind
    dynamic_pillar_enabled: false
    num_dynamic_pillars: 0
    dynamic_pillar_speed_min: 0.2
    dynamic_pillar_speed_max: 0.6
    dynamic_pillar_move_radius: 2.0
    dynamic_pillar_dir_change_interval_s: 2.0

  - stage: 5
    num_pillars: 12
    min_pillars: 12
    max_pillars: 22
    uniform_pillar: true
    min_decor_pillars: 6
    max_decor_pillars: 12
    min_steps: 0
    use_symbolic_extractor: true # 3-channel kinematic BEV (default False = 1-channel depth)
    # Stage 5: full sim-to-real — giữ nguyên stage 4
    obs_noise_pos_std: 0.15
    obs_noise_vel_std: 0.07
    obs_noise_yaw_std: 0.025
    obs_noise_ang_vel_std: 0.012
    obs_noise_quat_std: 0.012
    action_noise_std: 0.05
    action_delay_steps: 0        # per-episode uniform int in [0, 2]
    action_delay_steps_max: 2
    mass_scale_min: 0.90
    mass_scale_max: 1.10
    wind_speed_max: 0.3
    dynamic_pillar_enabled: false
    num_dynamic_pillars: 0
    dynamic_pillar_speed_min: 0.2
    dynamic_pillar_speed_max: 0.6
    dynamic_pillar_move_radius: 2.0
    dynamic_pillar_dir_change_interval_s: 2.0
