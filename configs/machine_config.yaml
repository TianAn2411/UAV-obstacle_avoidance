# Per-machine CPU tuning — edit before training on a new machine.
# Leaving pin_processes: false disables all affinity changes (safe default).

pin_processes: False


# Main PPO process (GPU training + SB3 orchestration)
main_process_cores: "0-3"       # 4 cores for PyTorch + rollout bookkeeping
torch_num_threads: 4             # intra-op parallelism (matrix ops)
torch_interop_threads: 2         # inter-op parallelism (async graph nodes)

# Per-env allocation: each rank gets cores [env_start + rank*cores_per_env .. +cores_per_env)
# env_start = last core in main_process_cores + 1  (= 4 for "0-3")
# 24-core machine example:
#   rank 0 → cores 4-9   (6 cores: PX4 + Gazebo + 4 bridges + worker)
#   rank 1 → cores 10-15
#   rank 2 → cores 16-21
#   cores 22-23 left for OS / other processes
cores_per_env: 5
