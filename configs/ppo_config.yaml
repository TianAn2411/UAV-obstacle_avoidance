algorithm: PPO
policy: MultiInputPolicy

# Core PPO
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5

# Training
total_timesteps: 5_000_000
n_envs: 1
log_dir: "runs/"
checkpoint_freq: 50_000

# Curriculum stages (num_pillars per stage)
curriculum:
  - {stage: 1, num_pillars: 0,  min_steps: 500_000}
  - {stage: 2, num_pillars: 2,  min_steps: 500_000}
  - {stage: 3, num_pillars: 5,  min_steps: 500_000}
  - {stage: 4, num_pillars: 10, min_steps: 500_000}
  - {stage: 5, num_pillars: 20, min_steps: 0}
